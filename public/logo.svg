<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Cyan-to-white gradient matching the Karboluxe wordmark -->
    <linearGradient id="kx-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="38%" stop-color="#f3fbff"/>
      <stop offset="65%" stop-color="#dcf5fb"/>
      <stop offset="100%" stop-color="#a8e4f0"/>
    </linearGradient>
    <!-- Subtle highlight band along the upper third -->
    <linearGradient id="kx-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Soft drop shadow that sits beneath the wordmark -->
    <filter id="kx-shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="blurred"/>
      <feComponentTransfer in="blurred" result="dim">
        <feFuncA type="linear" slope="0.55"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="dim"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Wordmark -->
  <g filter="url(#kx-shadow)">
    <text x="600" y="240"
          text-anchor="middle"
          font-family="'Archivo Black','Oswald','Inter Tight',Impact,sans-serif"
          font-style="italic"
          font-weight="900"
          font-size="220"
          letter-spacing="-4"
          fill="url(#kx-fill)"
          stroke="#ffffff"
          stroke-width="1.5">Karboluxe</text>
    <text x="600" y="240"
          text-anchor="middle"
          font-family="'Archivo Black','Oswald','Inter Tight',Impact,sans-serif"
          font-style="italic"
          font-weight="900"
          font-size="220"
          letter-spacing="-4"
          fill="url(#kx-shine)">Karboluxe</text>
  </g>
</svg>
