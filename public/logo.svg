<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0f1c"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9933"/>
      <stop offset="50%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#e55200"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ed8e8"/>
      <stop offset="50%" stop-color="#3ab0c8"/>
      <stop offset="100%" stop-color="#1e7a95"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dff7ff"/>
      <stop offset="100%" stop-color="#7ec5dd"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Orange swirl (behind) -->
  <g filter="url(#glow)" opacity="0.95">
    <path d="M 60,200 Q 80,100 200,90 Q 320,100 340,200" stroke="url(#orange)" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M 70,220 Q 90,140 200,130 Q 310,140 330,220" stroke="url(#orange)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 340,200 Q 320,290 200,305 Q 80,290 60,200" stroke="url(#orange)" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Cyan swirl -->
  <g filter="url(#glow)" opacity="0.95">
    <path d="M 340,200 Q 320,300 200,310 Q 80,300 60,200" stroke="url(#cyan)" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M 330,180 Q 310,260 200,275 Q 90,260 70,180" stroke="url(#cyan)" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M 60,200 Q 80,120 200,110 Q 320,120 340,200" stroke="url(#cyan)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Soccer ball -->
  <g transform="translate(200 195)">
    <circle r="65" fill="#fff" stroke="#222" stroke-width="2"/>
    <!-- center pentagon -->
    <polygon points="0,-22 21,-7 13,18 -13,18 -21,-7" fill="#1a1a2e"/>
    <!-- connecting black patches -->
    <polygon points="0,-22 21,-7 38,-35 14,-55 -14,-55 -38,-35 -21,-7" fill="#1a1a2e" opacity="0.8"/>
    <polygon points="21,-7 13,18 45,35 55,5 38,-35" fill="#1a1a2e" opacity="0.8"/>
    <polygon points="13,18 -13,18 -20,48 20,48 45,35" fill="#1a1a2e" opacity="0.8"/>
    <polygon points="-13,18 -21,-7 -38,-35 -55,5 -45,35 -20,48" fill="#1a1a2e" opacity="0.8"/>
    <circle r="65" fill="none" stroke="#333" stroke-width="2.5"/>
  </g>

  <!-- KARBOLUXE text -->
  <text x="200" y="355" font-family="'Oswald', 'Arial Black', sans-serif" font-weight="800" font-size="52" letter-spacing="2" text-anchor="middle" fill="url(#text)" font-style="italic" filter="url(#glow)">KARBOLUXE</text>
</svg>
